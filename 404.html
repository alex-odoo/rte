body{

.lost-card{

.links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.links a{
  padding:12px 24px;border-radius:10px;text-decoration:none;
  font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;
  transition:all 0.3s ease;
}
.links a.primary{
  background:linear-gradient(135deg,#c4a265,#9a7a3f);color:#0d0b1a;font-weight:700;
}
.links a.primary:hover{box-shadow:0 0 20px rgba(196,162,101,0.5);transform:translateY(-2px)}
.links a.secondary{
  border:1px solid rgba(196,162,101,0.3);color:#c4a265;
