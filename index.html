<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Магічні Послання Ангелів</title>
<meta name="description" content="Отримайте послання від ангелів. Оберіть карту і дізнайтесь, що хочуть сказати вам ангели.">
<meta property="og:title" content="Магічні Послання Ангелів">
<meta property="og:description" content="Отримайте послання від ангелів. Оберіть карту і дізнайтесь, що хочуть сказати вам ангели.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0d0b1a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👼</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --gold:#c4a265;--gold-light:#e8d5a3;--gold-dark:#9a7a3f;
    --bg:#0d0b1a;--bg-card:#12082a;--bg-grad1:#1a0f2e;--bg-grad2:#0d0b1a;
    --purple:#2a1555;--purple-light:rgba(120,80,200,0.15);
  }
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:'Cormorant Garamond',serif;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
    touch-action:manipulation;
  }
  .container{
    width:100%;height:100%;position:relative;overflow:hidden;
    background:radial-gradient(ellipse at center,var(--bg-grad1) 0%,var(--bg-grad2) 70%);
  }
  /* Stars */
  .stars{position:absolute;inset:0;overflow:hidden;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate}
  @keyframes twinkle{0%{opacity:.15}100%{opacity:.8}}
  /* Frame */
  .frame{position:absolute;inset:8px;border:1.5px solid rgba(196,162,101,.3);border-radius:14px;pointer-events:none;z-index:10}
  .frame::before{content:'';position:absolute;inset:4px;border:1px solid rgba(196,162,101,.12);border-radius:10px}
  /* Corners */
  .corner{position:absolute;width:40px;height:40px;z-index:11;pointer-events:none}
  .corner svg{width:100%;height:100%}
  .corner-tl{top:12px;left:12px}
  .corner-tr{top:12px;right:12px;transform:scaleX(-1)}
  .corner-bl{bottom:12px;left:12px;transform:scaleY(-1)}
  .corner-br{bottom:12px;right:12px;transform:scale(-1,-1)}
  /* Title */
  .title{position:absolute;top:4%;width:100%;text-align:center;z-index:5;color:var(--gold);text-shadow:0 0 20px rgba(196,162,101,.4)}
  .title h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,5vw,2rem);font-weight:600;letter-spacing:3px;margin-bottom:2px}
  .title p{font-family:'Cormorant Garamond',serif;font-size:clamp(.55rem,2.5vw,.8rem);letter-spacing:clamp(2px,1vw,5px);text-transform:uppercase;opacity:.65}
  /* Subtitle - angel feather decoration */
  .title-decor{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;opacity:.4}
  .title-decor span{width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .title-decor svg{width:16px;height:16px}
  /* Scene */
  .scene{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:clamp(160px,50vw,220px);height:clamp(260px,55vh,360px);
    perspective:900px;z-index:5;
  }
  .carousel{width:100%;height:100%;position:relative;transform-style:preserve-3d}
  /* Card */
  .card{
    position:absolute;
    width:clamp(140px,40vw,200px);height:clamp(220px,45vh,330px);
    left:50%;top:50%;
    margin-left:clamp(-70px,-20vw,-100px);margin-top:clamp(-110px,-22.5vh,-165px);
    backface-visibility:hidden;border-radius:12px;overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,.5),0 0 8px rgba(196,162,101,.25);
  }
  .card-face{
    width:100%;height:100%;
    background:linear-gradient(180deg,#18103a,#0f0828);
    border:2.5px solid var(--gold);border-radius:12px;
    display:flex;flex-direction:column;align-items:center;
    position:relative;overflow:hidden;
  }
  .card-face .cf-border{position:absolute;inset:5px;border:1px solid rgba(196,162,101,.25);border-radius:8px;pointer-events:none}
  .card-face .cf-num{margin-top:10px;font-size:clamp(.5rem,2vw,.6rem);color:var(--gold);letter-spacing:2px;opacity:.6;z-index:1}
  .card-face .cf-icon{width:clamp(70px,22vw,110px);height:clamp(75px,18vh,120px);margin:4px 0;display:flex;align-items:center;justify-content:center;z-index:1}
  .card-face .cf-icon svg{width:clamp(50px,15vw,75px);height:clamp(50px,15vw,75px)}
  .card-face .cf-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:2px 0;z-index:1}
  .card-face .cf-name{font-size:clamp(.6rem,3vw,.8rem);font-weight:600;color:var(--gold);text-align:center;letter-spacing:1px;padding:0 8px;text-shadow:0 0 6px rgba(196,162,101,.25);z-index:1}
  .card-face .cf-meaning{font-family:'Marck Script',cursive;font-size:clamp(.45rem,2vw,.55rem);color:rgba(220,200,170,.45);text-align:center;padding:0 10px;margin-top:2px;line-height:1.35;z-index:1}
  /* Angel glow on card */
  .card-face::after{
    content:'';position:absolute;top:-30%;left:-30%;width:160%;height:160%;
    background:radial-gradient(ellipse at 50% 30%,rgba(196,162,101,.06) 0%,transparent 60%);
    pointer-events:none;
  }
  /* Revealed Card */
  .revealed-card{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:clamp(200px,60vw,280px);height:clamp(320px,60vh,440px);
    z-index:20;border-radius:14px;overflow:hidden;
    border:2.5px solid var(--gold);
    box-shadow:0 0 60px rgba(196,162,101,.35),0 0 120px rgba(100,50,180,.25);
    background:linear-gradient(180deg,#18103a,#0f0828);
    opacity:0;transition:transform .8s cubic-bezier(.34,1.56,.64,1),opacity .5s ease;
  }
  .revealed-card.show{transform:translate(-50%,-50%) scale(1);opacity:1}
  .revealed-card .inner-border{position:absolute;inset:6px;border:1.5px solid rgba(196,162,101,.4);border-radius:10px;pointer-events:none}
  .revealed-card .card-number{text-align:center;color:var(--gold);font-size:clamp(.65rem,2.5vw,.8rem);letter-spacing:3px;margin-top:clamp(12px,3vh,18px);opacity:.7}
  .revealed-card .card-image{
    width:clamp(110px,35vw,160px);height:clamp(120px,22vh,190px);
    margin:clamp(6px,1.5vh,10px) auto;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse,rgba(196,162,101,.06),transparent);
    border-radius:8px;border:1px solid rgba(196,162,101,.2);overflow:hidden;
  }
  .card-icon-svg{width:clamp(65px,20vw,100px);height:clamp(65px,20vw,100px)}
  .revealed-card .card-name{
    text-align:center;color:var(--gold);font-size:clamp(.85rem,4vw,1.15rem);
    font-weight:700;letter-spacing:2px;padding:0 10px;
    text-shadow:0 0 10px rgba(196,162,101,.35);
  }
  .revealed-card .card-meaning{
    text-align:center;color:rgba(220,200,170,.65);font-family:'Marck Script',cursive;
    font-size:clamp(.65rem,3vw,.85rem);letter-spacing:1px;margin-top:6px;
    padding:0 clamp(12px,4vw,20px);line-height:1.45;
  }
  .revealed-card .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:8px auto}
  /* Instruction */
  .instruction{
    position:absolute;bottom:5%;width:100%;text-align:center;z-index:5;
    color:rgba(196,162,101,.75);font-size:clamp(.7rem,3vw,.9rem);
    letter-spacing:clamp(2px,.8vw,4px);text-transform:uppercase;animation:pulse 2s infinite;
  }
  .instruction.hidden{display:none}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .tap-again{
    position:absolute;bottom:5%;width:100%;text-align:center;z-index:25;
    color:rgba(196,162,101,.75);font-size:clamp(.6rem,2.5vw,.8rem);
    letter-spacing:clamp(2px,.6vw,3px);text-transform:uppercase;
    opacity:0;transition:opacity .5s ease 1.5s;
  }
  .tap-again.show{opacity:1}
  /* Particles */
  .particles{position:absolute;inset:0;z-index:15;pointer-events:none;overflow:hidden}
  .particle{position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;opacity:0}
  /* Glow ring */
  .glow-ring{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    width:clamp(280px,70vw,380px);height:clamp(280px,70vw,380px);
    border-radius:50%;border:1.5px solid rgba(196,162,101,.25);
    box-shadow:0 0 60px rgba(196,162,101,.12),inset 0 0 60px rgba(196,162,101,.08);
    z-index:12;opacity:0;transition:transform 1s ease-out,opacity 1.5s ease;
  }
  .glow-ring.show{transform:translate(-50%,-50%) scale(1);opacity:1}
  /* Angel ring (replaces zodiac) */
  .angel-ring{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:clamp(280px,70vw,380px);height:clamp(280px,70vw,380px);
    border-radius:50%;z-index:1;opacity:.12;
    animation:rotateRing 80s linear infinite;
  }
  .angel-char{position:absolute;color:var(--gold);font-size:clamp(.8rem,2.5vw,1.1rem)}
  @keyframes rotateRing{to{transform:translate(-50%,-50%) rotate(360deg)}}
  /* Feather floating animation */
  .feather{
    position:absolute;opacity:0;z-index:0;pointer-events:none;
    animation:featherFloat linear infinite;
  }
  @keyframes featherFloat{
    0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0}
    10%{opacity:.15}
    90%{opacity:.15}
    100%{transform:translateY(100vh) rotate(360deg) translateX(40px);opacity:0}
  }

  /* Mobile responsive overrides */
  @media (max-width:480px){
    .frame{inset:5px;border-radius:10px}
    .corner{width:28px;height:28px}
    .corner-tl{top:8px;left:8px}
    .corner-tr{top:8px;right:8px}
    .corner-bl{bottom:8px;left:8px}
    .corner-br{bottom:8px;right:8px}
    .title{top:3%}
  }
  @media (max-height:600px){
    .title{top:1%}
    .title h1{font-size:1rem}
    .title p{font-size:.5rem}
    .scene{height:clamp(200px,48vh,300px)}
    .instruction,.tap-again{bottom:2%}
  }
  @media (orientation:landscape) and (max-height:500px){
    .title{top:1%;display:flex;align-items:center;justify-content:center;gap:10px}
    .title h1{font-size:.9rem;margin-bottom:0}
    .title p{font-size:.45rem}
    .title-decor{display:none}
    .scene{height:clamp(180px,70vh,280px);width:clamp(120px,30vw,180px)}
  }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="stars" id="stars"></div>
  <div class="angel-ring" id="angelRing"></div>
  <div class="frame"></div>
  <div class="corner corner-tl"><svg viewBox="0 0 40 40"><path d="M2,38 L2,10 Q2,2 10,2 L38,2" fill="none" stroke="rgba(196,162,101,0.45)" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="rgba(196,162,101,0.35)"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 40 40"><path d="M2,38 L2,10 Q2,2 10,2 L38,2" fill="none" stroke="rgba(196,162,101,0.45)" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="rgba(196,162,101,0.35)"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 40 40"><path d="M2,38 L2,10 Q2,2 10,2 L38,2" fill="none" stroke="rgba(196,162,101,0.45)" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="rgba(196,162,101,0.35)"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 40 40"><path d="M2,38 L2,10 Q2,2 10,2 L38,2" fill="none" stroke="rgba(196,162,101,0.45)" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="rgba(196,162,101,0.35)"/></svg></div>
  <div class="title">
    <h1>ПОСЛАННЯ АНГЕЛІВ</h1>
    <p>Отримайте пораду від ангелів</p>
    <div class="title-decor">
      <span></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,162,101,0.6)" stroke-width="1.5"><path d="M12 2L14 8L20 8L15 12L17 18L12 14L7 18L9 12L4 8L10 8Z"/></svg>
      <span></span>
    </div>
  </div>
  <div class="scene">
    <div class="carousel" id="carousel"></div>
  </div>
  <div class="revealed-card" id="revealedCard">
    <div class="inner-border"></div>
    <div class="card-number" id="cardNumber"></div>
    <div class="card-image" id="cardImage"></div>
    <div class="divider"></div>
    <div class="card-name" id="cardName"></div>
    <div class="card-meaning" id="cardMeaning"></div>
  </div>
  <div class="glow-ring" id="glowRing"></div>
  <div class="particles" id="particles"></div>
  <div class="instruction" id="instruction">Натисніть, щоб отримати послання</div>
  <div class="tap-again" id="tapAgain">Натисніть, щоб перемішати</div>
</div>
<script src="cards.js"></script>
<script src="app.js"></script>
</body>
</html>
